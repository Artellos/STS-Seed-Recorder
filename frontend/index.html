<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>STS Seed Recorder</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="app-header">
    <h1>STS Seed Recorder</h1>
    <button id="btn-new-seed" class="btn btn-primary">+ New Seed</button>
  </header>

  <main class="seed-list-page">
    <div id="seeds-empty" class="empty-state" style="display:none">
      <p>No seeds recorded yet. Click <strong>+ New Seed</strong> to get started.</p>
    </div>
    <table id="seeds-table" class="seeds-table" style="display:none">
      <thead>
        <tr>
          <th>Seed</th>
          <th>Label</th>
          <th>Created</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="seeds-tbody"></tbody>
    </table>
    <div id="seeds-loading" class="loading">Loading seeds…</div>
  </main>

  <!-- New Seed Modal -->
  <div id="modal-new-seed" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>New Seed</h2>
      <label>
        Seed Number <span class="required">*</span>
        <input id="input-seed-value" type="text" placeholder="e.g. 3NZPAN4BL" autocomplete="off" />
      </label>
      <label>
        Label <span class="optional">(optional)</span>
        <input id="input-seed-name" type="text" placeholder="e.g. Amazing Act 1" autocomplete="off" />
      </label>
      <div id="modal-error" class="form-error" style="display:none"></div>
      <div class="modal-actions">
        <button id="btn-modal-cancel" class="btn btn-secondary">Cancel</button>
        <button id="btn-modal-create" class="btn btn-primary">Create</button>
      </div>
    </div>
  </div>

  <!-- Confirm Delete Modal -->
  <div id="modal-confirm-delete" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>Delete Seed?</h2>
      <p id="confirm-delete-msg"></p>
      <div class="modal-actions">
        <button id="btn-delete-cancel" class="btn btn-secondary">Cancel</button>
        <button id="btn-delete-confirm" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/seeds.js"></script>
</body>
</html>
